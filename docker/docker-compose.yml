services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/packages/*/dist
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: relcko
      POSTGRES_USER: relcko
      POSTGRES_PASSWORD: relcko_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
